name: ${PKG_NAME}
arch: ${OS_ARCH}
version: ${VERSION}
release: ${REVISION}
version_schema: none
section: net
priority: optional
maintainer: Flomesh <khas@flomesh.io>
description: |
  Pipy - programmable network proxy
  Pipy is a tiny, high performance, highly stable, programmable
  network proxy for the cloud, edge and IoT.
homepage: https://github.com/flomesh-io/pipy
license: NEU

contents:
  - src: bin/pipy
    dst: /usr/local/bin/pipy
    file_info:
      mode: 0755
  - dst: /etc/pipy
    type: dir
    file_info:
      mode: 0755
  # systemd service — deb, archlinux, rpm only
  - src: nfpm/pipy.service
    dst: /usr/lib/systemd/system/pipy.service
    file_info:
      mode: 0644
    packager: deb
  - src: nfpm/pipy.service
    dst: /usr/lib/systemd/system/pipy.service
    file_info:
      mode: 0644
    packager: archlinux
  - src: nfpm/pipy.service
    dst: /usr/lib/systemd/system/pipy.service
    file_info:
      mode: 0644
    packager: rpm

scripts:
  preinstall: nfpm/preinstall.sh
  postinstall: nfpm/postinstall.sh
  preremove: nfpm/preremove.sh
  postremove: nfpm/postremove.sh

overrides:
  deb:
    depends:
      - libc6
      - zlib1g
      - libstdc++6
    conflicts:
      - ${PIPY_CONFLICTS}
  archlinux:
    depends:
      - zlib
      - gcc-libs
    conflicts:
      - ${PIPY_CONFLICTS}
  rpm:
    depends:
      - glibc
      - zlib
      - libstdc++
    conflicts:
      - ${PIPY_CONFLICTS}
  apk:
    depends:
      - zlib
      - libstdc++
  ipk:
    depends: []
