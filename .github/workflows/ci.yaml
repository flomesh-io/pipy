name: CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - .github/workflows/ci.yaml

env:
  PKG_NAME: pipy
  S3_PATH: repo/pipy

defaults:
  run:
    shell: bash

jobs:
  set-release-version:
    name: Set Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set RELEASE_VERSION
        id: version
        run: |
          CI_COMMIT_DATE=$(date +%Y%m%d%H%M)
          echo "release_version=nightly-${CI_COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "commit_date=${CI_COMMIT_DATE}" >> $GITHUB_OUTPUT
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      commit_date: ${{ steps.version.outputs.commit_date }}

  build:
    name: Build ${{ matrix.arch }}
    needs: set-release-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cmake/DependencyVersions.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Build
        id: build
        env:
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
        run: |
          ./build.sh -p -t ${RELEASE_VERSION}
          echo "artifact_name=$(ls *${RELEASE_VERSION}*.tar.gz | head -n1)" >> $GITHUB_OUTPUT
          echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: pipy-${{ matrix.runner }}-${{ needs.set-release-version.outputs.release_version }}
          path: ${{ steps.build.outputs.artifact_name }}
          
      - name: Setup s3cmd
        if: ${{ env.S3_ACCESS_KEY != '' }}
        env:
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        run: |
          sudo apt-get install -y s3cmd
          cat > $HOME/.s3cfg << EOF
          bucket_location = ${{ secrets.S3_REGION }}
          host_base = ${{ secrets.S3_GLOBAL_ACC_HOST_BASE }}
          host_bucket = %(bucket)s.${{ secrets.S3_GLOBAL_ACC_HOST_BASE }}
          access_key = ${{ secrets.S3_ACCESS_KEY }}
          secret_key = ${{ secrets.S3_SECRET_KEY }}
          EOF

      - name: Upload to S3
        if: ${{ env.S3_ACCESS_KEY != '' }}
        env:
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        run: |
          if [[ "$RELEASE_VERSION" == "nightly"* ]]; then
            s3cmd put ${{ steps.build.outputs.artifact_name }} s3://${{ secrets.S3_BUCKET }}/${S3_PATH}-nightly/$(uname -m)/binary/${{ steps.build.outputs.artifact_name }}
          else
            s3cmd put ${{ steps.build.outputs.artifact_name }} s3://${{ secrets.S3_BUCKET }}/${S3_PATH}/$(uname -m)/binary/${{ steps.build.outputs.artifact_name }}
          fi

  save-log:
    name: Save Log
    if: ${{ always() && !contains(join(needs.*.result, ','), 'failure') && !contains(needs.build.result, 'cancelled') }}
    needs:
      - set-release-version
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Save log
        if: ${{ env.REPO_DISPATCH_PAT != '' }}
        env:
          REPO_DISPATCH_PAT: ${{ secrets.REPO_DISPATCH_PAT }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_PAT }}
          repository: ${{ secrets.REPO_FOR_LOG }}
          event-type: save-log
          client-payload: '{"github": ${{ toJSON(github) }}, "release_version": "${{ needs.set-release-version.outputs.release_version }}"}'
